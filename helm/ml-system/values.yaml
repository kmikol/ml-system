global:
  namespace: ml-system
  imageRegistry: ""
  imagePullPolicy: IfNotPresent

serving:
  enabled: true
  replicas: 1
  image: ml-system-serving:latest
  port: 8000
  env:
    DATA_CONTROLLER_DB_URL: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
    LOKI_URL: "http://loki:3100"
    DATASET_S3_ENDPOINT_URL: "http://minio:9000"
    DATASET_BUCKET: "mnist-dataset"
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    MODEL_NAME: "ml_system_model"
    MODEL_STAGE: "Production"
    SERVING_SIMULATED_LATENCY_MS: "0"
  service:
    type: ClusterIP
  resources:
    requests: { memory: "512Mi", cpu: "500m" }
    limits: { memory: "1Gi", cpu: "1000m" }

mlflow:
  enabled: true
  image: ml-system-mlflow:latest
  port: 5000
  backendUri: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
  artifactRoot: "s3://mlflow-artifacts/"
  s3EndpointUrl: "http://minio:9000"
  service:
    type: ClusterIP

postgres:
  enabled: true
  image: postgres:15
  db: mlflow
  user: mlflow
  persistence:
    size: 5Gi
  service:
    type: ClusterIP

minio:
  enabled: true
  image: minio/minio
  mcImage: minio/mc
  apiPort: 9000
  consolePort: 9001
  persistence:
    size: 10Gi
  service:
    type: ClusterIP

lakefs:
  enabled: true
  image: treeverse/lakefs:1.48
  port: 8000
  repo: ml-system-datasets
  storageNamespace: "s3://lakefs-data/"
  service:
    type: ClusterIP

prometheus:
  enabled: true
  image: prom/prometheus:v2.50.0
  port: 9090
  externalUrl: ""
  routePrefix: ""
  persistence:
    size: 5Gi
  service:
    type: ClusterIP
  scrapeIntervalSeconds: 5
  evaluationIntervalSeconds: 5

alertmanager:
  enabled: true
  image: prom/alertmanager:v0.26.0
  port: 9093
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

grafana:
  enabled: true
  image: grafana/grafana:10.3.0
  port: 3000
  adminPassword: ""
  rootUrl: ""
  serveFromSubPath: false
  persistence:
    size: 1Gi
  service:
    type: ClusterIP

alloy:
  enabled: true
  image: grafana/alloy:latest
  scrapeIntervalSeconds: 5
  httpListenAddr: "0.0.0.0:12345"
  argoWorkflowsMetricsPort: 9090
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

loki:
  enabled: true
  image: grafana/loki:2.9.0
  port: 3100
  persistence:
    size: 5Gi
  service:
    type: ClusterIP

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  # Target RPS per replica — KEDA scales to ceil(total_rps / targetRPS) pods.
  # Should match the simulated per-pod throughput cap in serving.
  targetRPS: 5
  # Window for rate() in the Prometheus query. Should be >= 2x scrape interval.
  rateWindow: "30s"
  # How often KEDA queries the metric.
  pollingIntervalSeconds: 10
  cooldownPeriod: 30
  # Scale-up: add up to scaleUpPercent% of current replicas every scaleUpPeriodSeconds.
  # 100% means: 1→2, 2→4, 4→8 — doubles each period. Relative, not hardcoded.
  scaleUpPercent: 100
  scaleUpPeriodSeconds: 15
  # Scale-down: remove 1 pod every scaleDownPeriodSeconds after stabilization window.
  scaleDownStabilizationSeconds: 60
  scaleDownPeriodSeconds: 15

# Credentials used by postgres, minio, mlflow, and serving.
# All values must be provided via an override file (e.g. values-local.yaml).
# Helm will fail at render time if any are missing.
secrets:
  minioAccessKey: ""
  minioSecretKey: ""
  postgresPassword: ""
  lakefs:
    accessKeyId: ""
    secretAccessKey: ""
    encryptSecretKey: ""

training:
  image: ml-system-training:latest

annotation:
  image: ml-system-annotation:latest

mlExporter:
  enabled: false
  image: ml-system-ml-exporter:latest
  port: 8001
  env:
    DATA_CONTROLLER_DB_URL: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    MODEL_NAME: "ml_system_model"
    MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    DRIFT_POLL_INTERVAL: "5"
    DRIFT_WINDOW_SECONDS: "300"
    REFERENCE_CACHE_TTL_SECONDS: "300"
  resources:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "250m" }
  service:
    type: ClusterIP

canary:
  enabled: false
  # Canary rollout steps: list of traffic weights (%).
  # After each step an AnalysisRun validates PSI before progressing.
  steps:
    - weight: 20
    - weight: 40
  # AnalysisTemplate parameters
  analysis:
    # How often the analysis query is evaluated.
    interval: "30s"
    # Number of consecutive failures before the rollout is aborted.
    failureLimit: 3
    # Initial delay before the first analysis measurement, gives time
    # for the canary to accumulate enough predictions for a meaningful PSI.
    initialDelay: "60s"
    # PSI factor: canary passes if psi_canary < psi_production * factor.
    # 0.8 = canary must show at least 20% less drift than production.
    psiFactor: "0.8"
    # Minimum predictions in the canary window before analysis is valid.
    minSamples: "50"

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/$1"
  host: localhost
  paths:
    serving: /serving/?(.*)
    mlflow: /mlflow/(.*)
    grafana: /grafana/?(.*)
    prometheus: /prometheus/?(.*)
    minioApi: /minio/?(.*)
    minioConsole: /minio-console/?(.*)
