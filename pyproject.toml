[tool.pytest.ini_options]
filterwarnings = [
    # Third-party package internals — not fixable from our side.
    "ignore:pkg_resources is deprecated:DeprecationWarning",
    "ignore:The distutils package is deprecated:DeprecationWarning",
    "ignore:Distutils was imported before Setuptools:UserWarning",
    "ignore:Setuptools is replacing distutils:UserWarning",
    # Pydantic v1 validators inside mlflow.gateway (mlflow internals).
    "ignore::pydantic.warnings.PydanticDeprecatedSince20",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["shared", "serving", "training", "controller"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
