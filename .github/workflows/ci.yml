name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:

  lint:
    name: Lint
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.4.0"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install \
            "mypy>=1.10.0" \
            "pydantic>=2.6.0" \
            "fastapi>=0.110.0" \
            "prometheus-client>=0.20.0" \
            "prometheus-fastapi-instrumentator>=6.1.0" \
            "numpy>=1.26.0" \
            "boto3>=1.34.0"
      - run: |
          python -m mypy serving annotation sampling monitoring/ml_exporter shared \
            --ignore-missing-imports --no-strict-optional

  unit-tests:
    name: Unit tests
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt
      - run: pip install -r tests/requirements.txt
      - run: |
          PYTHONPATH=. pytest \
            tests/unit/ \
            shared/data_controller/tests/unit/ \
            shared/model_artifact_controller/tests/unit/ \
            -v --tb=short

  helm-validate:
    name: Helm chart validation
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml pytest
      - run: PYTHONPATH=. pytest tests/helm/ -v --tb=short

  integration-tests:
    name: Integration tests
    needs: [lint, typecheck, unit-tests, helm-validate]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test.integration
