{{- if .Values.lakefs.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lakefs-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakefs
  namespace: {{ .Values.global.namespace }}
  labels:
    app: lakefs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lakefs
  template:
    metadata:
      labels:
        app: lakefs
    spec:
      containers:
        - name: lakefs
          image: {{ .Values.lakefs.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: LAKEFS_DATABASE_TYPE
              value: local
            - name: LAKEFS_BLOCKSTORE_TYPE
              value: s3
            - name: LAKEFS_BLOCKSTORE_S3_ENDPOINT
              value: http://minio:9000
            - name: LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE
              value: "true"
            - name: LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: minio-access-key
            - name: LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: minio-secret-key
            - name: LAKEFS_AUTH_ENCRYPT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: lakefs-encrypt-secret-key
            - name: LAKEFS_INSTALLATION_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: lakefs-access-key-id
            - name: LAKEFS_INSTALLATION_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: lakefs-secret-access-key
            - name: LAKEFS_INSTALLATION_USER_NAME
              value: admin
          ports:
            - containerPort: {{ .Values.lakefs.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /_health
              port: {{ .Values.lakefs.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /home/lakefs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lakefs-data
---
# Job to create the lakeFS repository on first install.
# Uses || true so the Job is idempotent: if the repo already exists lakectl
# exits non-zero, but we treat that as success and log the output either way.
apiVersion: batch/v1
kind: Job
metadata:
  name: lakefs-init
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-lakefs
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://lakefs:{{ .Values.lakefs.port }}/_health; do
                echo "waiting for lakefs..."; sleep 3
              done
      containers:
        - name: lakectl
          image: {{ .Values.lakefs.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: LAKECTL_CREDENTIALS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: lakefs-access-key-id
            - name: LAKECTL_CREDENTIALS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: lakefs-secret-access-key
            - name: LAKECTL_SERVER_ENDPOINT_URL
              value: http://lakefs:{{ .Values.lakefs.port }}
          command:
            - sh
            - -c
            - |
              output=$(lakectl repo create \
                lakefs://{{ .Values.lakefs.repo }} \
                {{ .Values.lakefs.storageNamespace }} 2>&1)
              rc=$?
              echo "$output"
              if [ $rc -eq 0 ]; then
                echo "lakeFS repository created."
              else
                echo "lakeFS repository already exists or non-fatal error (rc=$rc); continuing."
              fi
              exit 0
---
apiVersion: v1
kind: Service
metadata:
  name: lakefs
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.lakefs.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.lakefs.port }}
      targetPort: {{ .Values.lakefs.port }}
      name: http
  selector:
    app: lakefs
{{- end }}
