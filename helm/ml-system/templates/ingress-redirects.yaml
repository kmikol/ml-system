{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-system-ingress-redirects
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: /mlflow/
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /mlflow
            pathType: Exact
            backend:
              service:
                name: mlflow
                port:
                  number: {{ .Values.mlflow.port }}
{{- end }}
