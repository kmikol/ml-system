apiVersion: v1
kind: Secret
metadata:
  name: ml-system-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  minio-access-key: {{ required "secrets.minioAccessKey is required" .Values.secrets.minioAccessKey | quote }}
  minio-secret-key: {{ required "secrets.minioSecretKey is required" .Values.secrets.minioSecretKey | quote }}
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  lakefs-access-key-id: {{ required "secrets.lakefs.accessKeyId is required" .Values.secrets.lakefs.accessKeyId | quote }}
  lakefs-secret-access-key: {{ required "secrets.lakefs.secretAccessKey is required" .Values.secrets.lakefs.secretAccessKey | quote }}
  lakefs-encrypt-secret-key: {{ required "secrets.lakefs.encryptSecretKey is required" .Values.secrets.lakefs.encryptSecretKey | quote }}
---
# Argo Workflows run in the argo namespace and cannot reference secrets from
# ml-system. Mirror the same secret so workflow steps can use secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: ml-system-secrets
  namespace: argo
type: Opaque
stringData:
  minio-access-key: {{ .Values.secrets.minioAccessKey | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | quote }}
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  lakefs-access-key-id: {{ .Values.secrets.lakefs.accessKeyId | quote }}
  lakefs-secret-access-key: {{ .Values.secrets.lakefs.secretAccessKey | quote }}
  lakefs-encrypt-secret-key: {{ .Values.secrets.lakefs.encryptSecretKey | quote }}
