# ══════════════════════════════════════════════════════════════════
# Test infrastructure — mirrors the Kubernetes service topology.
#
# Service names, image versions, and credentials intentionally match
# helm/ml-system/values.yaml so integration tests run against the
# same environment as production Kubernetes workloads.
#
# Usage:
#   make test                          ← run all tests (unit + integration)
#   make test.integration              ← integration tests only
#   docker compose -f docker-compose.test.yml down -v   ← clean up
# ══════════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mlflow-artifacts &&
      mc mb --ignore-existing local/test-dataset &&
      mc mb --ignore-existing local/lakefs-data &&
      echo 'Buckets ready.'
      "
    restart: "no"

  lakefs:
    image: treeverse/lakefs:1.48
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      LAKEFS_DATABASE_TYPE: local
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: http://minio:9000
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: minioadmin
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: minioadmin
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: "test-encryption-secret-key"
      LAKEFS_INSTALLATION_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
      LAKEFS_INSTALLATION_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      LAKEFS_INSTALLATION_USER_NAME: admin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/_health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: shared/model_artifact_controller/mlflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  model-seed:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      MODEL_NAME: ml_system_model
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: python tests/integration/seed_model.py
    restart: "no"

  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    depends_on:
      model-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      DATA_CONTROLLER_DB_URL: postgresql://mlflow:mlflow@postgres:5432/mlflow
      DATASET_S3_ENDPOINT_URL: http://minio:9000
      DATASET_BUCKET: test-dataset
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MODEL_NAME: ml_system_model
      MODEL_STAGE: Production
      SERVING_MODEL_POLL_INTERVAL: "5"
      SERVING_SIMULATED_LATENCY_MS: "0"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request, json; d=json.load(urllib.request.urlopen('http://localhost:8000/health', timeout=5)); raise SystemExit(0 if d.get('model_loaded') else 1)"
      interval: 5s
      timeout: 5s
      retries: 20

  test:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      lakefs:
        condition: service_healthy
      serving:
        condition: service_healthy
    environment:
      DATA_CONTROLLER_DB_URL: postgresql://mlflow:mlflow@postgres:5432/mlflow
      DATASET_S3_ENDPOINT_URL: http://minio:9000
      DATASET_BUCKET: test-dataset
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      LAKEFS_ENDPOINT_URL: http://lakefs:8000
      LAKEFS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      LAKEFS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      LAKEFS_REPO: ml-system-datasets
      SERVING_BASE_URL: http://serving:8000
      MODEL_NAME: ml_system_model
      SERVING_MODEL_POLL_INTERVAL: "5"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      pytest
        tests/unit/
        shared/data_controller/tests/unit/
        shared/data_controller/tests/integration/
        shared/model_artifact_controller/tests/unit/
        shared/model_artifact_controller/tests/integration/
        tests/integration/test_serving_e2e.py
        -v

networks:
  default:
    name: ml-system-test
