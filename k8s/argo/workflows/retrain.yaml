# k8s/argo/workflows/retrain.yaml
#
# RBAC + WorkflowTemplate: model retraining pipeline with canary rollout.
#
# Triggered by the retrain-sensor when BOTH alerts fire simultaneously:
#   - PsiThresholdBreached    (PSI class distribution > 0.25)
#   - AnnotationCountReached  (>= 50 annotated samples not yet in training)
#
# Steps (sequential):
#   1. integrate-annotations — builds a new cumulative dataset version from
#      annotated predictions; writes version_id to /tmp/version_id.txt
#   2. train                 — trains on the new version, registers in MLflow
#                              (promotion deferred); writes run_id to /tmp/run_id.txt
#   3. evaluate-and-promote  — compares val_acc against Production; promotes to
#                              Canary alias if new model meets threshold.
#                              Writes canary model version + current production
#                              model version for downstream canary analysis.
#   4. trigger-canary-rollout — patches the Argo Rollout annotations to start
#                               progressive canary deployment with NGINX traffic
#                               splitting (20% → 40% → 100%), validated by PSI
#                               analysis at each step.
#   5. wait-for-rollout       — blocks until the Argo Rollout either succeeds
#                               (full promotion) or aborts (PSI analysis failed).
#   6. promote-to-production  — moves the MLflow alias from Canary → Production
#                               so that any future pod restarts load the correct
#                               model. Only runs if the rollout succeeded.

---
# ServiceAccount for the retrain workflow.
# Needs workflowtaskresults access (required by Argo emissary executor),
# deployment/rollout get/list/watch/patch for rollout management.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: retrain-workflow
  namespace: argo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: retrain-workflow-role
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, patch]
  - apiGroups: [argoproj.io]
    resources: [rollouts]
    verbs: [get, list, watch, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-retrain-workflow-role
subjects:
  - kind: ServiceAccount
    name: retrain-workflow
    namespace: argo
roleRef:
  kind: ClusterRole
  name: retrain-workflow-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: retrain
  namespace: argo
spec:
  serviceAccountName: retrain-workflow
  entrypoint: retrain

  templates:

    # ── Entrypoint: sequential steps ─────────────────────────────────────────
    - name: retrain
      steps:
        - - name: integrate-annotations
            template: integrate-annotations
        - - name: train
            template: train
            arguments:
              parameters:
                - name: version-id
                  value: "{{steps.integrate-annotations.outputs.parameters.version-id}}"
        - - name: evaluate-and-promote
            template: evaluate-and-promote
            arguments:
              parameters:
                - name: run-id
                  value: "{{steps.train.outputs.parameters.run-id}}"
                - name: version-id
                  value: "{{steps.integrate-annotations.outputs.parameters.version-id}}"
        - - name: trigger-canary-rollout
            template: trigger-canary-rollout
            arguments:
              parameters:
                - name: canary-model-version
                  value: "{{steps.evaluate-and-promote.outputs.parameters.model-version}}"
                - name: production-model-version
                  value: "{{steps.evaluate-and-promote.outputs.parameters.production-model-version}}"
            when: "'{{steps.evaluate-and-promote.outputs.parameters.model-version}}' != ''"
        - - name: wait-for-rollout
            template: wait-for-rollout
            when: "'{{steps.evaluate-and-promote.outputs.parameters.model-version}}' != ''"
        - - name: promote-to-production
            template: promote-to-production
            arguments:
              parameters:
                - name: canary-model-version
                  value: "{{steps.evaluate-and-promote.outputs.parameters.model-version}}"
            when: "'{{steps.evaluate-and-promote.outputs.parameters.model-version}}' != '' && '{{steps.wait-for-rollout.outputs.parameters.rollout-status}}' == 'healthy'"

    # ── Step 1: integrate-annotations ────────────────────────────────────────
    - name: integrate-annotations
      outputs:
        parameters:
          - name: version-id
            valueFrom:
              path: /tmp/version_id.txt
      initContainers:
        - name: wait-for-lakefs
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://lakefs.ml-system.svc.cluster.local:8000/health; do
                echo "waiting for lakefs..."; sleep 3
              done
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, scripts/integrate_annotations.py]
        env:
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"
          - name: LAKEFS_ENDPOINT_URL
            value: "http://lakefs.ml-system.svc.cluster.local:8000"
          - name: LAKEFS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-access-key-id
          - name: LAKEFS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-secret-access-key
          - name: LAKEFS_REPO
            value: "ml-system-datasets"
          - name: VERSION_ID_OUTPUT_PATH
            value: "/tmp/version_id.txt"

    # ── Step 2: train ─────────────────────────────────────────────────────────
    - name: train
      inputs:
        parameters:
          - name: version-id
      outputs:
        parameters:
          - name: run-id
            valueFrom:
              path: /tmp/run_id.txt
      initContainers:
        - name: wait-for-mlflow
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://mlflow.ml-system.svc.cluster.local:5000/health; do
                echo "waiting for mlflow..."; sleep 3
              done
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, -m, training.main]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow.ml-system.svc.cluster.local:5000"
          - name: MLFLOW_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: MODEL_NAME
            value: "ml_system_model"
          - name: TRAINING_MAX_EPOCHS
            value: "20"
          - name: TRAINING_SEED
            value: "42"
          - name: TRAINING_BATCH_SIZE
            value: "256"
          - name: TRAINING_LR
            value: "1e-3"
          - name: AUTO_PROMOTE
            value: "false"
          - name: LAKEFS_ENDPOINT_URL
            value: "http://lakefs.ml-system.svc.cluster.local:8000"
          - name: LAKEFS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-access-key-id
          - name: LAKEFS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-secret-access-key
          - name: LAKEFS_REPO
            value: "ml-system-datasets"
          - name: RUN_ID_OUTPUT_PATH
            value: "/tmp/run_id.txt"

    # ── Step 3: evaluate-and-promote ─────────────────────────────────────────
    # Promotes to Canary alias (not Production) so the Argo Rollout can
    # progressively validate before the model becomes Production.
    # Also outputs the current Production model version for PSI comparison.
    - name: evaluate-and-promote
      inputs:
        parameters:
          - name: run-id
          - name: version-id
      outputs:
        parameters:
          - name: model-version
            valueFrom:
              path: /tmp/promoted_model_version.txt
          - name: production-model-version
            valueFrom:
              path: /tmp/production_model_version.txt
              default: ""
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, scripts/evaluate_and_promote.py]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow.ml-system.svc.cluster.local:5000"
          - name: MLFLOW_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: MODEL_NAME
            value: "ml_system_model"
          - name: LAKEFS_ENDPOINT_URL
            value: "http://lakefs.ml-system.svc.cluster.local:8000"
          - name: LAKEFS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-access-key-id
          - name: LAKEFS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ml-system-secrets
                key: lakefs-secret-access-key
          - name: LAKEFS_REPO
            value: "ml-system-datasets"
          - name: NEW_RUN_ID
            value: "{{inputs.parameters.run-id}}"
          - name: VERSION_ID
            value: "{{inputs.parameters.version-id}}"
          - name: MIN_VAL_ACC_IMPROVEMENT
            value: "0.0"
          - name: PROMOTE_STAGE
            value: "Canary"
          - name: PROMOTED_MODEL_VERSION_OUTPUT_PATH
            value: "/tmp/promoted_model_version.txt"
          - name: PRODUCTION_VERSION_OUTPUT_PATH
            value: "/tmp/production_model_version.txt"

    # ── Step 4: trigger-canary-rollout ───────────────────────────────────────
    # Patches the Argo Rollout with canary/production model version annotations
    # and a restart timestamp. Argo Rollouts detects the spec change and
    # creates a canary ReplicaSet with pods that load the Canary MLflow alias.
    - name: trigger-canary-rollout
      inputs:
        parameters:
          - name: canary-model-version
          - name: production-model-version
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: [sh, -c]
        args:
          - |
            set -e
            CANARY_VER="{{inputs.parameters.canary-model-version}}"
            PROD_VER="{{inputs.parameters.production-model-version}}"
            STAMP=$(date +%s)
            echo "Triggering canary rollout: canary=$CANARY_VER production=$PROD_VER"
            # Patch both top-level annotations (for analysis args fieldRef)
            # and pod template annotation (to force a new ReplicaSet / revision).
            kubectl -n ml-system patch rollout fastapi-serving --type=merge -p "{
              \"metadata\": {
                \"annotations\": {
                  \"ml-system/canary-model-version\": \"$CANARY_VER\",
                  \"ml-system/production-model-version\": \"$PROD_VER\"
                }
              },
              \"spec\": {
                \"template\": {
                  \"metadata\": {
                    \"annotations\": {
                      \"ml-system/restart-stamp\": \"$STAMP\"
                    }
                  }
                }
              }
            }"
            echo "Rollout patch applied."

    # ── Step 5: wait-for-rollout ─────────────────────────────────────────────
    # Polls the Argo Rollout status until it reaches a terminal state.
    # Outputs "healthy" on full promotion, "degraded" on abort.
    - name: wait-for-rollout
      outputs:
        parameters:
          - name: rollout-status
            valueFrom:
              path: /tmp/rollout_status.txt
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: [sh, -c]
        args:
          - |
            set -e
            echo "Waiting for Argo Rollout to reach terminal state..."
            # Poll until phase is Healthy or Degraded.
            while true; do
              PHASE=$(kubectl -n ml-system get rollout fastapi-serving \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "unknown")
              echo "  rollout phase: $PHASE"
              case "$PHASE" in
                Healthy)
                  echo "Rollout completed successfully."
                  echo "healthy" > /tmp/rollout_status.txt
                  exit 0
                  ;;
                Degraded)
                  echo "Rollout aborted — canary PSI analysis failed."
                  echo "degraded" > /tmp/rollout_status.txt
                  exit 0
                  ;;
              esac
              sleep 15
            done

    # ── Step 6: promote-to-production ────────────────────────────────────────
    # Moves the MLflow alias from Canary → Production after a successful
    # canary rollout. This ensures that if any pod restarts (scaling,
    # preemption, node failure) it loads the validated model.
    - name: promote-to-production
      inputs:
        parameters:
          - name: canary-model-version
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, -c]
        args:
          - |
            import os, sys
            sys.path.insert(0, "/app")
            os.environ.setdefault("MODEL_NAME", "ml_system_model")
            os.environ.setdefault("MLFLOW_TRACKING_URI", "http://mlflow.ml-system.svc.cluster.local:5000")
            os.environ.setdefault("MLFLOW_S3_ENDPOINT_URL", "http://minio.ml-system.svc.cluster.local:9000")
            from shared.model_artifact_controller import ModelStore, ModelStage
            store = ModelStore()
            version = store.get_version_for_run("{{inputs.parameters.canary-model-version}}")
            if version is None:
                # canary-model-version is actually the version string, not run_id.
                # Use the MLflow backend directly to promote by version.
                store._backend.promote_model("ml_system_model", "{{inputs.parameters.canary-model-version}}", alias="Production")
            else:
                store.promote(version, stage=ModelStage.PRODUCTION)
            print("Promoted v{{inputs.parameters.canary-model-version}} -> Production")
        env:
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow.ml-system.svc.cluster.local:5000"
          - name: MLFLOW_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"
          - name: MODEL_NAME
            value: "ml_system_model"
