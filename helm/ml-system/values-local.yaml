# ── Helm overrides for local k3d development ──────────────────────────────────
# This file is the single source of truth for Helm/Kubernetes config.
#
# Credentials, endpoints, and model params that appear in the env: sections
# below intentionally mirror .env (the Makefile source of truth).
# When you change a value, update BOTH files.
# ──────────────────────────────────────────────────────────────────────────────

global:
  # Never pull from registry — use images imported via `make k3d.import`.
  # Only applies to custom-built images (serving, mlflow).
  # Public images (postgres, minio, grafana, prometheus, alloy) always use IfNotPresent.
  imagePullPolicy: Never

serving:
  replicas: 1
  env:
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    MODEL_NAME: "ml_system_model"
    MODEL_STAGE: "Production"
    SERVING_SIMULATED_LATENCY_MS: "100"

ingress:
  enabled: true
  host: ""

grafana:
  rootUrl: "%(protocol)s://%(domain)s/grafana/"
  serveFromSubPath: true
  adminPassword: admin

secrets:
  minioAccessKey: minioadmin
  minioSecretKey: minioadmin
  postgresPassword: mlflow
  lakefs:
    accessKeyId: AKIAIOSFODNN7EXAMPLE
    secretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    encryptSecretKey: local-dev-encrypt-key

postgres:
  service:
    type: NodePort
    nodePort: 30005

minio:
  service:
    type: ClusterIP

canary:
  enabled: true

mlExporter:
  enabled: true

alertmanager:
  enabled: true
