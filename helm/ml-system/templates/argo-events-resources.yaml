# RBAC for Argo Events Sensor to submit Workflows cross-namespace (ml-system → argo).
# CRD instances (EventBus, EventSource, Sensor, WorkflowTemplate) live in
# k8s/argo/argo-events-resources.yaml and are applied via kubectl SSA in k3d.deploy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-events-workflow-submitter
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-events-workflow-submitter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-events-workflow-submitter
subjects:
  - kind: ServiceAccount
    name: argo-events-sa
    namespace: {{ .Values.global.namespace }}
