{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.global.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeIntervalSeconds }}s
      evaluation_interval: {{ .Values.prometheus.evaluationIntervalSeconds }}s

    # No scrape jobs here — Alloy handles collection and remote-writes metrics in.
    # Prometheus runs with --web.enable-remote-write-receiver.

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.{{ .Values.global.namespace }}.svc.cluster.local:9093

  alerts.yml: |
    groups:
      - name: ml_serving
        rules:
          - alert: PsiThresholdBreached
            expr: drift_psi_class_distribution > 0.25
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "PSI class distribution exceeds 0.25 — drift detected"
              description: "drift_psi_class_distribution={{ "{{" }} $value {{ "}}" }}"
          - alert: AnnotationCountReached
            expr: annotation_annotated_count >= 50
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "50+ annotated samples available for retraining"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.prometheus.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-remote-write-receiver
          ports:
            - containerPort: {{ .Values.prometheus.port }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: {{ .Values.prometheus.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.prometheus.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port }}
      {{- if .Values.prometheus.service.nodePort }}
      nodePort: {{ .Values.prometheus.service.nodePort }}
      {{- end }}
  selector:
    app: prometheus
{{- end }}
