# ══════════════════════════════════════════════════════════════════
# ML System — Docker Compose
#
# ALL values come from .env — never hardcode anything here.
#
# Active (Phase 1): postgres, minio, minio-init, mlflow, serving, training
# Inactive: commented out, uncomment per phase.
# ══════════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/mlflow-artifacts &&
      mc mb --ignore-existing local/dvc-data &&
      mc mb --ignore-existing local/argo-artifacts &&
      echo 'Buckets ready.'
      "
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_URI}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT}
      --host 0.0.0.0
      --port 5000
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
      SERVING_MODEL_POLL_INTERVAL: ${SERVING_MODEL_POLL_INTERVAL}
      REDIS_URL: ${REDIS_URL}
      REDIS_STREAM_NAME: ${REDIS_STREAM_NAME}
      SERVING_SIMULATED_LATENCY_MS: ${SERVING_SIMULATED_LATENCY_MS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    ports:
      - "8000:8000"

  training:
    build:
      context: .
      dockerfile: training/Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MODEL_NAME: ${MODEL_NAME}
      TRAINING_MAX_EPOCHS: ${TRAINING_MAX_EPOCHS}
      TRAINING_SEED: ${TRAINING_SEED}
      TRAINING_BATCH_SIZE: ${TRAINING_BATCH_SIZE}
      TRAINING_LR: ${TRAINING_LR}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    profiles:
      - training

  # ════════════════════════════════════════════════════════════════
  # PHASE 3 — Monitoring
  # ════════════════════════════════════════════════════════════════

  # redis:
  #   image: redis:7-alpine
