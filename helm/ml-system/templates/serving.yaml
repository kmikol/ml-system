{{- if .Values.serving.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-serving
  namespace: {{ .Values.global.namespace }}
  labels:
    app: fastapi-serving
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.serving.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: fastapi-serving
  template:
    metadata:
      labels:
        app: fastapi-serving
    spec:
      initContainers:
        # Block until MLflow is accepting requests.
        - name: wait-for-mlflow
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://mlflow:{{ .Values.mlflow.port }}/health; do
                echo "waiting for mlflow..."; sleep 5
              done
      containers:
        - name: serving
          image: {{ .Values.serving.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.serving.port }}
          env:
            {{- range $key, $val := .Values.serving.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            # AWS credentials from Secret so they are not exposed in values files.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: minio-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ml-system-secrets
                  key: minio-secret-key
          readinessProbe:
            # Serving returns 503 until the ONNX model is loaded from MLflow.
            # Without this probe, k8s routes traffic to the pod before it is ready.
            httpGet:
              path: /health
              port: {{ .Values.serving.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24   # up to 2 min for model download on slow connections
          resources:
            {{- toYaml .Values.serving.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-serving
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.serving.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.serving.port }}
      targetPort: {{ .Values.serving.port }}
      {{- if .Values.serving.service.nodePort }}
      nodePort: {{ .Values.serving.service.nodePort }}
      {{- end }}
  selector:
    app: fastapi-serving
{{- end }}
