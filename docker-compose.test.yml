# ══════════════════════════════════════════════════════════════════
# Test infrastructure — mirrors the Kubernetes service topology.
#
# Service names, image versions, and credentials intentionally match
# helm/ml-system/values.yaml so integration tests run against the
# same environment as production Kubernetes workloads.
#
# Usage:
#   make test                          ← run all tests (unit + integration)
#   make test.integration              ← integration tests only
#   docker compose -f docker-compose.test.yml down -v   ← clean up
# ══════════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mlflow-artifacts &&
      mc mb --ignore-existing local/test-dataset &&
      echo 'Buckets ready.'
      "
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: shared/model_artifact_controller/mlflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      DATA_CONTROLLER_DB_URL: postgresql://mlflow:mlflow@postgres:5432/mlflow
      DATASET_S3_ENDPOINT_URL: http://minio:9000
      DATASET_BUCKET: test-dataset
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      pytest
        annotation/tests/unit/
        monitoring/ml_exporter/tests/unit/
        sampling/tests/unit/
        serving/tests/unit/
        training/tests/unit/
        shared/tests/unit/
        shared/schemas/tests/unit/
        shared/data_controller/tests/unit/
        shared/data_controller/tests/integration/
        shared/model_artifact_controller/tests/unit/
        shared/model_artifact_controller/tests/integration/
        -v

networks:
  default:
    name: ml-system-test
