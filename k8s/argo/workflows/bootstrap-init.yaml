# k8s/argo/workflows/bootstrap-init.yaml
#
# RBAC + WorkflowTemplate: one-time cluster bootstrap pipeline.
#
# Submitted by `make k3d.bootstrap.workflow` after `k3d.deploy` completes.
# Runs entirely in-cluster so all service addresses are FQDN, not localhost NodePorts.
#
# Steps (sequential):
#   1. seed-data      — seeds MNIST v0 split into Postgres + MinIO
#   2. verify-data    — validates counts and spot-checks pixel round-trip
#   3. train          — trains model, exports ONNX, registers in MLflow
#   4. restart-serving — rolls out fastapi-serving so it loads the new model
#
# Prerequisites:
#   - make data.prepare  (creates data/v0/ baked into ml-system-training image)
#   - make k3d.build     (builds ml-system-training:latest with scripts/ + data/v0/)
#   - make k3d.import    (imports training image into k3d containerd)
#   - make k3d.deploy    (applies this file, creating the WorkflowTemplate)

---
# Dedicated ServiceAccount for this workflow.
# Only this SA (not the default argo SA) gets deployment-patch permissions.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-restarter
  namespace: argo

---
# ClusterRole: allows reading + patching Deployments in any namespace,
# plus the Argo emissary executor requirement (workflowtaskresults).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bootstrap-deployment-restarter
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, patch]
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]

---
# Bind the ClusterRole to the bootstrap-restarter SA in the argo namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-bootstrap-deployment-restarter
subjects:
  - kind: ServiceAccount
    name: bootstrap-restarter
    namespace: argo
roleRef:
  kind: ClusterRole
  name: bootstrap-deployment-restarter
  apiGroup: rbac.authorization.k8s.io

---
# WorkflowTemplate: bootstrap-init
#
# Triggered once during k3d.bootstrap via a concrete Workflow resource
# (see make k3d.bootstrap.workflow).  Safe to re-run — seed is idempotent
# (ON CONFLICT DO NOTHING) and MLflow registers a new run each time.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bootstrap-init
  namespace: argo
spec:
  serviceAccountName: bootstrap-restarter
  entrypoint: bootstrap

  templates:

    # ── Entrypoint: sequential steps ─────────────────────────────────────────
    - name: bootstrap
      steps:
        - - name: seed-data
            template: seed-data
        - - name: verify-data
            template: verify-data
        - - name: train
            template: train
        - - name: restart-serving
            template: restart-serving

    # ── Step 1: seed-data ─────────────────────────────────────────────────────
    # Waits for Postgres + MinIO, then loads data/v0/ splits into both stores.
    - name: seed-data
      initContainers:
        - name: wait-for-postgres
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z postgres.ml-system.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 3
              done
        - name: wait-for-minio
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio.ml-system.svc.cluster.local:9000/minio/health/ready; do
                echo "waiting for minio..."; sleep 3
              done
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, scripts/seed_dataset.py]
        env:
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"

    # ── Step 2: verify-data ───────────────────────────────────────────────────
    # Validates counts in Postgres and spot-checks pixel round-trip with MinIO.
    - name: verify-data
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, scripts/verify_dataset.py]
        env:
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"

    # ── Step 3: train ─────────────────────────────────────────────────────────
    # Waits for MLflow to be ready, then trains and registers the model.
    - name: train
      initContainers:
        - name: wait-for-mlflow
          image: busybox
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://mlflow.ml-system.svc.cluster.local:5000/health; do
                echo "waiting for mlflow..."; sleep 3
              done
      container:
        image: ml-system-training:latest
        imagePullPolicy: Never
        workingDir: /app
        command: [python, -m, training.main]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow.ml-system.svc.cluster.local:5000"
          - name: MLFLOW_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: AWS_ACCESS_KEY_ID
            value: "minioadmin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "minioadmin"
          - name: DATA_CONTROLLER_DB_URL
            value: "postgresql://mlflow:mlflow@postgres.ml-system.svc.cluster.local:5432/mlflow"
          - name: DATASET_S3_ENDPOINT_URL
            value: "http://minio.ml-system.svc.cluster.local:9000"
          - name: DATASET_BUCKET
            value: "mnist-dataset"
          - name: MODEL_NAME
            value: "ml_system_model"
          - name: TRAINING_MAX_EPOCHS
            value: "20"
          - name: TRAINING_SEED
            value: "42"
          - name: TRAINING_BATCH_SIZE
            value: "256"
          - name: TRAINING_LR
            value: "1e-3"

    # ── Step 4: restart-serving ───────────────────────────────────────────────
    # Rolls out fastapi-serving so it picks up the freshly registered model.
    # Uses bitnami/kubectl (pulled by k3s); the bootstrap-restarter SA token
    # is automatically mounted at /var/run/secrets/kubernetes.io/serviceaccount/.
    - name: restart-serving
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command:
          - kubectl
          - rollout
          - restart
          - deployment/fastapi-serving
          - -n
          - ml-system
